<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Gmail Earnings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0b0f19; color: white; margin-bottom: 90px; overflow-x: hidden; }
        .app-banner { background: linear-gradient(145deg, #4f46e5, #9333ea); border-radius: 30px; position: relative; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); }
        .card-gradient { background: #161b2c; border: 1px solid #2d3748; transition: 0.3s; }
        .btn-premium { background: linear-gradient(90deg, #fbbf24, #f59e0b); color: #000; font-weight: 800; letter-spacing: 1px; box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3); }
        .bottom-nav { background: rgba(22, 27, 44, 0.95); backdrop-filter: blur(10px); border-top: 1px solid #2d3748; }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input { background: #0b0f19 !important; border: 1px solid #2d3748 !important; color: white !important; }
        .notice-btn { background: #ef4444; padding: 5px 15px; border-radius: 50px; font-size: 12px; font-weight: bold; animation: pulse 2s infinite; }
    </style>
</head>
<body>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBOXjOvNwx fbiT7k_h5",
        authDomain: "sell-14df3.firebaseapp.com",
        databaseURL: "https://sell-14df3-default-rtdb.firebaseio.com",
        projectId: "sell-14df3",
        storageBucket: "sell-14df3.firebasestorage.app",
        messagingSenderId: "694027361200",
        appId: "1:694027361200:web:74277e9282363574277e92"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let userId = localStorage.getItem('prime_uid') || 'user_' + Math.floor(Math.random() * 1000000);
    localStorage.setItem('prime_uid', userId);

    let currentBalance = 0; // গ্লোবাল ভেরিয়েবল ব্যালেন্স ট্র্যাক করার জন্য

    function loadData() {
        database.ref('users/' + userId).on('value', (snapshot) => {
            const data = snapshot.val() || { balance: 0, dailyCount: 0 };
            currentBalance = data.balance || 0; // আপডেট ব্যালেন্স
            document.getElementById('balance').innerText = currentBalance.toFixed(2);
            document.getElementById('daily-done').innerText = data.dailyCount || 0;
        });
        database.ref('history/' + userId).on('value', (snapshot) => { renderHistory(snapshot.val()); });
    }
</script>

    <div class="p-4 flex justify-between items-center text-sm">
        <span class="opacity-70"><i class="fas fa-bolt text-yellow-400 mr-1"></i> Prime Earnings</span>
        <button onclick="showNotice()" class="notice-btn uppercase">নোটিশ</button>
        <span id="current-time" class="opacity-70">12:00 PM</span>
    </div>

    <!-- Home Section -->
    <div id="home" class="section active p-4">
        <div class="app-banner p-6 mb-8 text-center">
            <i class="fas fa-envelope-open-text text-5xl text-yellow-300 mb-4 block"></i>
            <h1 class="text-2xl font-black italic tracking-tighter mb-2 uppercase">PRIME DIGITAL EARNINGS</h1>
            <p class="text-[10px] opacity-80 uppercase tracking-widest">Sell Gmail & Earn Money</p>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="card-gradient p-5 rounded-3xl">
                <p class="text-xs opacity-50 font-bold uppercase">Balance</p>
                <h3 class="text-2xl font-black mt-1">৳ <span id="balance">0.00</span></h3>
            </div>
            <div class="card-gradient p-5 rounded-3xl text-blue-400">
                <p class="text-xs opacity-50 font-bold text-white uppercase">Daily Submit</p>
                <h3 class="text-2xl font-black mt-1" id="daily-done">0</h3>
            </div>
        </div>
        <button onclick="showSection('sell')" class="w-full btn-premium p-5 rounded-3xl text-lg font-bold"><i class="fas fa-plus-circle"></i> SELL GMAIL NOW (7 TK)</button>
    </div>

    <!-- Sell Section -->
    <div id="sell" class="section p-4">
        <div class="card-gradient p-6 rounded-[35px] space-y-4">
            <h2 class="text-xl font-bold text-center">📥 জিমেইল সাবমিট</h2>
            <input id="gmail-addr" type="email" placeholder="example@gmail.com" class="w-full p-4 rounded-2xl">
            <input id="gmail-pass" type="text" value="@tamim2050" class="w-full p-4 rounded-2xl text-yellow-400">
            <button onclick="handleSell()" id="sell-btn" class="w-full btn-premium py-4 rounded-2xl shadow-xl">SUBMIT FOR REVIEW</button>
            <button onclick="showSection('home')" class="w-full text-xs opacity-40 uppercase">Back</button>
        </div>
    </div>

    <!-- Withdraw Section -->
    <div id="withdraw" class="section p-4">
        <h2 class="text-2xl font-bold mb-6 italic">Withdraw Money</h2>
        <div class="card-gradient p-6 rounded-[35px] space-y-4">
            <select id="w-method" class="w-full p-4 rounded-2xl bg-[#0b0f19] border border-[#2d3748]">
                <option value="Bkash">Bkash</option>
                <option value="Nagad">Nagad</option>
            </select>
            <input id="w-amount" type="number" placeholder="Amount (Min 50)" class="w-full p-4 rounded-2xl">
            <input id="w-number" type="number" placeholder="Phone Number" class="w-full p-4 rounded-2xl">
            <button onclick="handleWithdraw()" id="withdraw-btn" class="w-full btn-premium py-4 rounded-2xl shadow-xl">WITHDRAW REQUEST</button>
        </div>
    </div>

    <!-- History Section -->
    <div id="history" class="section p-4">
        <h2 class="text-2xl font-bold mb-6 italic">History</h2>
        <div id="history-list" class="space-y-3"></div>
    </div>

    <!-- Navigation -->
    <div class="bottom-nav fixed bottom-0 left-0 right-0 p-4 flex justify-around items-center">
        <button onclick="showSection('home')" class="nav-item flex flex-col items-center"><i class="fas fa-home"></i><span class="text-[9px]">HOME</span></button>
        <button onclick="showSection('sell')" class="nav-item flex flex-col items-center"><i class="fas fa-envelope"></i><span class="text-[9px]">SELL</span></button>
        <button onclick="showSection('withdraw')" class="nav-item flex flex-col items-center"><i class="fas fa-wallet"></i><span class="text-[9px]">PAYOUT</span></button>
        <button onclick="showSection('history')" class="nav-item flex flex-col items-center"><i class="fas fa-list-alt"></i><span class="text-[9px]">HISTORY</span></button>
    </div>

<script>
    function showNotice() { database.ref('notice').once('value', (snap) => { alert(snap.val() || "🌟 আসসালামু আলাইকুম!"); }); }
    
    function showSection(id) { 
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); 
        document.getElementById(id).classList.add('active'); 
        if(id === 'history') loadData(); 
    }

    function handleSell() {
        let email = document.getElementById('gmail-addr').value;
        let pass = document.getElementById('gmail-pass').value;
        if(!email) return alert("ইমেইল দিন!");
        
        document.getElementById('sell-btn').innerText = "Processing...";
        const id = Date.now();
        
        // টাস্ক সাবমিট (অ্যাডমিন পরে এপ্রুভ করলে টাকা অ্যাড হবে)
        database.ref('tasks/' + id).set({ user: userId, email: email, pass: pass, status: 'Pending', time: new Date().toLocaleString() });
        database.ref('history/' + userId + '/' + id).set({ info: email, amount: 7, type: 'SELL', status: 'Pending', date: new Date().toLocaleString() });
        
        alert("সফলভাবে সাবমিট হয়েছে! অ্যাডমিন চেক করে ব্যালেন্স যোগ করে দিবে।"); 
        location.reload();
    }

    // উইথড্র ফাংশন (যেখানে ব্যালেন্স কেটে নেওয়া হবে)
    function handleWithdraw() {
        let amount = parseFloat(document.getElementById('w-amount').value);
        let num = document.getElementById('w-number').value;
        let method = document.getElementById('w-method').value;

        if(!amount || amount < 50) return alert("মিনিমাম ৫০ টাকা উইথড্র করুন!");
        if(!num) return alert("ফোন নাম্বার দিন!");
        
        // ব্যালেন্স চেক
        if(amount > currentBalance) {
            return alert("আপনার পর্যাপ্ত ব্যালেন্স নেই! বর্তমান ব্যালেন্স: " + currentBalance + " TK");
        }

        const btn = document.getElementById('withdraw-btn');
        btn.disabled = true;
        btn.innerText = "Processing...";

        const id = Date.now();
        const newBalance = currentBalance - amount;

        // ১. ডাটাবেসে ব্যালেন্স আপডেট করা (কমানো)
        database.ref('users/' + userId).update({
            balance: newBalance
        }).then(() => {
            // ২. উইথড্র রিকোয়েস্ট লিস্টে পাঠানো
            database.ref('withdraws/' + id).set({ 
                user: userId, 
                amount: amount, 
                num: num, 
                method: method,
                status: 'Pending', 
                time: new Date().toLocaleString() 
            });

            // ৩. হিস্টোরিতে সেভ করা
            database.ref('history/' + userId + '/' + id).set({ 
                info: method + ": " + num, 
                amount: amount, 
                type: 'WITHDRAW', 
                status: 'Pending', 
                date: new Date().toLocaleString() 
            });

            alert("উইথড্র রিকোয়েস্ট সফল হয়েছে! " + amount + " টাকা কেটে নেওয়া হয়েছে।");
            showSection('home');
        }).catch(err => {
            alert("কিছু সমস্যা হয়েছে, আবার চেষ্টা করুন।");
            btn.disabled = false;
            btn.innerText = "WITHDRAW REQUEST";
        });
    }

    function renderHistory(data) {
        const list = document.getElementById('history-list'); 
        list.innerHTML = "";
        if(!data) { list.innerHTML = "<p class='text-center opacity-30'>No history found</p>"; return; }
        
        for(let id in data) {
            const item = data[id];
            list.innerHTML += `<div class="card-gradient p-4 rounded-2xl flex justify-between items-center border-l-4 ${item.status==='Success'?'border-green-500':'border-yellow-500'}">
                <div><p class="text-xs font-bold">${item.info}</p><p class="text-[8px] opacity-40">${item.date}</p></div>
                <div class="text-right"><p class="font-bold text-sm">${item.type==='SELL'?'+':'-'}${item.amount} TK</p><p class="text-[8px] font-bold text-yellow-500">${item.status}</p></div>
            </div>`;
        }
    }

    loadData();
    setInterval(() => { 
        document.getElementById('current-time').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); 
    }, 1000);
</script>
</body>
</html>
